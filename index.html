<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cafetería Gourmet - El mejor café artesanal en un ambiente relajante. Visítanos o chatea con nosotros.">
    <title>Aroma & Grano | Tu Cafetería Favorita</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#">☕ Aroma & Grano</a>
            <div class="ms-auto">Horario: Lun-Sab 8:00 - 20:00</div>
        </div>
    </nav>

    <header class="hero d-flex align-items-center text-center">
        <div class="container" data-aos="fade-up">
            <h1 class="display-3">Despierta tus sentidos</h1>
            <p class="lead">Café recién tostado en el corazón de la ciudad.</p>
        </div>
    </header>

    <section id="menu" class="py-5">
        <div class="container text-center">
            <h2 class="mb-4">Nuestra Carta</h2>
            <div class="row g-4" id="menu-container">
                </div>
        </div>
    </section>

    <section id="contacto" class="py-5 bg-light">
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <h3>Escríbenos</h3>
                    <form>
                        <input type="text" class="form-control mb-3" placeholder="Nombre" required>
                        <input type="email" class="form-control mb-3" placeholder="Email" required>
                        <textarea class="form-control mb-3" placeholder="Tu mensaje"></textarea>
                        <button type="submit" class="btn btn-coffee w-100">Enviar</button>
                    </form>
                    <p class="mt-3">O directo a: <a href="mailto:hola@cafeteria.com">hola@cafeteria.com</a></p>
                </div>
                <div class="col-md-6 text-center">
                    <h3>Ubicación & Chat</h3>
                    <p>Calle Café 123, Centro Histórico.</p>
                    <div class="chatbot-trigger">💬 ¿Necesitas ayuda? Usa nuestro bot.</div>
                </div>
            </div>
        </div>
    </section>

    <div id="loader" class="loader-overlay d-none">
        <div class="spinner-border text-warning"></div>
    </div>

    <div class="modal fade" id="menuModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" id="modal-body-content"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
